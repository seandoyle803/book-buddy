kind = "web"
previewPath = "/"
title = "BookBuddy"
version = "1.0.0"
id = "artifacts/bookbuddy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20442

[services.development]
run = "pnpm --filter @workspace/bookbuddy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bookbuddy", "run", "build" ]
publicDir = "artifacts/bookbuddy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20442"
BASE_PATH = "/"
